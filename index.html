<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Quiz Antincendio</title>

<style>

body{
font-family:Arial;
background:#0f1a2b;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#16253f;
padding:30px;
border-radius:12px;
}

input{
width:80%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.start{
background:#ff6b00;
color:white;
}

.admin{
background:#f5a300;
}

.timer{
font-size:26px;
margin-top:10px;
color:#ffc107;
}

.question{
font-size:22px;
margin-top:20px;
}

.answer{
display:block;
width:100%;
background:#29456f;
color:white;
margin:10px 0;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.answer:disabled{
cursor:default;
opacity:1;
}

.correct{
background:#1b5e20 !important;
}

.wrong{
background:#8e0000 !important;
}

.feedback{
margin-top:15px;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #29456f;
padding:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 Quiz Antincendio</h1>

<input id="nome" placeholder="Nome e Cognome">
<br>

<input id="azienda" placeholder="Azienda">

<div class="timer" id="timer">30:00</div>

<button class="start" onclick="startQuiz()">INIZIA QUIZ</button>

<button class="admin" onclick="toggleAdmin()">PANNELLO ADMIN</button>

<div id="quiz"></div>

<div id="result"></div>

<div id="admin" style="display:none"></div>

</div>

<script>

const PASS=70

let state={
nome:"",
azienda:"",
question:0,
score:0,
timer:1800,
storico:[]
}

const questions=[

{q:"Quale estintore usare su quadri elettrici?",a:["Acqua","CO2","Schiuma","Sabbia"],c:1},

{q:"Classe A riguarda:",a:["Gas","Solidi","Liquidi","Metalli"],c:1},

{q:"Classe B riguarda:",a:["Liquidi infiammabili","Legno","Carta","Tessuti"],c:0},

{q:"Classe C riguarda:",a:["Gas","Carta","Olio","Plastica"],c:0},

{q:"Triangolo del fuoco:",a:["Combustibile comburente calore","Fumo aria acqua","Gas acqua scintilla","Cenere calore aria"],c:0},

{q:"Prima di usare estintore:",a:["Togliere sicura","Capovolgere","Aprire","Scuotere"],c:0},

{q:"Il getto va diretto:",a:["Sul fumo","Alla base fiamme","In alto","Sul soffitto"],c:1},

{q:"Prima azione incendio:",a:["Dare allarme","Aprire porte","Scappare","Spegnere luce"],c:0},

{q:"Ascensore incendio:",a:["Usarlo","Non usarlo","Solo capi","Solo emergenza"],c:1},

{q:"Durata estintore:",a:["10 secondi","5 minuti","1 ora","30 minuti"],c:0},

{q:"Fumo:",a:["Correre","Abbassarsi","Saltare","Aprire finestre"],c:1},

{q:"Vie esodo:",a:["Libere","Chiuse","Bloccate","Occupate"],c:0},

{q:"Numero emergenza:",a:["113","118","112","117"],c:2},

{q:"Piano emergenza:",a:["Solo capo","Solo antincendio","Tutti","Solo manutentori"],c:2},

{q:"Dopo spegnimento:",a:["Andare via","Controllare riaccensione","Accendere luci","Aprire finestre"],c:1},

{q:"CO2 utile su:",a:["Quadri elettrici","Legno","Carta","Tessuti"],c:0},

{q:"Evacuazione:",a:["Quando voglio","Ordine emergenza","Fine turno","Solo fumo"],c:1},

{q:"Buona prevenzione:",a:["Uscite libere","Uscite bloccate","Cartoni vicino quadro","Prese piene"],c:0},

{q:"Prevenzione serve per:",a:["Multe","Ridurre rischio","Lavorare meno","Eliminare DPI"],c:1},

{q:"Estintore acqua su elettrico:",a:["Si","No","Solo poco","Dipende"],c:1}

]

let timer

function startQuiz(){

state.nome=document.getElementById("nome").value
state.azienda=document.getElementById("azienda").value

if(!state.nome||!state.azienda){
alert("Inserisci nome e azienda")
return
}

state.question=0
state.score=0
state.timer=1800

document.getElementById("quiz").style.display="block"

timer=setInterval(()=>{

state.timer--

let m=Math.floor(state.timer/60)
let s=state.timer%60

document.getElementById("timer").innerHTML=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

if(state.timer<=0){
finishQuiz()
}

},1000)

renderQuestion()

}

function renderQuestion(){

if(state.question>=questions.length){
finishQuiz()
return
}

let q=questions[state.question]

let html=`<div class="question">${q.q}</div>`

q.a.forEach((ans,i)=>{

html+=`<button class="answer" onclick="answer(${i})">${ans}</button>`

})

html+=`<div id="feedback" class="feedback"></div>`
html+=`<p>Domanda ${state.question+1} di ${questions.length}</p>`

document.getElementById("quiz").innerHTML=html

}

function answer(i){

let q=questions[state.question]

let buttons=document.querySelectorAll(".answer")

buttons.forEach((b,index)=>{

b.disabled=true

if(index===q.c) b.classList.add("correct")

if(index===i && i!==q.c) b.classList.add("wrong")

})

if(i===q.c) state.score++

document.getElementById("feedback").innerHTML=

i===q.c ?
"Risposta corretta ✅"
:
"Risposta errata ❌<br>Corretta: "+q.a[q.c]

setTimeout(()=>{

state.question++
renderQuestion()

},1500)

}

function finishQuiz(){

clearInterval(timer)

let pct=Math.round((state.score/questions.length)*100)

let esito=pct>=PASS?"IDONEO":"NON IDONEO"

state.storico.push({
nome:state.nome,
azienda:state.azienda,
punteggio:state.score,
percentuale:pct,
esito:esito
})

localStorage.setItem("quiz",JSON.stringify(state.storico))

document.getElementById("quiz").innerHTML=""
document.getElementById("result").innerHTML=

`<h2>Quiz completato</h2>
<p>Punteggio ${state.score}/${questions.length}</p>
<p>${pct}%</p>
<h3>${esito}</h3>`

renderAdmin()

}

function toggleAdmin(){

let a=document.getElementById("admin")

if(a.style.display==="none"){
a.style.display="block"
renderAdmin()
}else{
a.style.display="none"
}

}

function renderAdmin(){

let data=JSON.parse(localStorage.getItem("quiz")||"[]")

if(data.length===0){
document.getElementById("admin").innerHTML="Nessun risultato"
return
}

let html="<table><tr><th>Nome</th><th>Azienda</th><th>Punteggio</th><th>%</th><th>Esito</th></tr>"

data.forEach(r=>{

html+=`<tr>
<td>${r.nome}</td>
<td>${r.azienda}</td>
<td>${r.punteggio}</td>
<td>${r.percentuale}</td>
<td>${r.esito}</td>
</tr>`

})

html+="</table>"

document.getElementById("admin").innerHTML=html

}

</script>

</body>
</html>
