<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Antincendio Completo</title>
<style>
  body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#0b1730;
    color:#fff;
    text-align:center;
  }
  .container{
    max-width:1000px;
    margin:20px auto;
    background:#1e2d47;
    border-radius:18px;
    padding:24px;
  }
  h1,h2,h3{margin-top:0}
  input[type="text"]{
    width:420px;
    max-width:90%;
    padding:12px;
    border-radius:8px;
    border:none;
    font-size:16px;
  }
  button{
    background:#f25c05;
    color:#fff;
    border:none;
    border-radius:10px;
    padding:12px 22px;
    font-size:16px;
    cursor:pointer;
    margin:8px;
  }
  button:hover{opacity:.92}
  .admin-btn{
    background:#c78b00;
  }
  #quizBox{
    display:none;
    text-align:left;
    margin-top:25px;
  }
  .question{
    background:#16243d;
    border-radius:14px;
    padding:16px;
    margin-bottom:16px;
  }
  .question h3{
    margin:0 0 10px 0;
    font-size:20px;
  }
  .question p{
    margin:0 0 12px 0;
    font-size:18px;
    line-height:1.45;
  }
  label{
    display:block;
    margin:8px 0;
    font-size:17px;
    cursor:pointer;
  }
  .timer{
    font-size:30px;
    font-weight:bold;
    color:#ffd86a;
    margin:12px 0;
  }
  .codebox{
    margin:20px auto;
  }
  .signbox{
    background:#fff;
    width:100%;
    max-width:520px;
    margin:10px auto;
    border-radius:10px;
    padding:10px;
  }
  canvas{
    background:#fff;
    border:1px solid #ccc;
    border-radius:8px;
    width:100%;
    height:180px;
    touch-action:none;
    display:block;
  }
  #resultBox{
    display:none;
    margin-top:20px;
    padding:18px;
    border-radius:14px;
    background:#13273d;
    font-size:18px;
    text-align:left;
  }
  .small{
    font-size:14px;
    color:#d0d7e2;
  }
  .adminpanel{
    display:none;
    margin-top:25px;
    background:#13273d;
    padding:16px;
    border-radius:14px;
    text-align:left;
  }
  table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    background:#fff;
    color:#000;
  }
  th,td{
    border:1px solid #ccc;
    padding:8px;
    font-size:14px;
    text-align:left;
  }
  .top-note{
    font-size:15px;
    color:#dfe7f3;
  }
  .actions{
    text-align:center;
  }
  .correct{
    color:#7dff9f;
    font-weight:bold;
  }
  .wrong{
    color:#ff9b9b;
    font-weight:bold;
  }
  .locked-note{
    font-size:13px;
    margin-top:8px;
  }
  .review-box{
    background:#16243d;
    border-radius:12px;
    padding:14px;
    margin:12px 0;
  }
  .hidden{
    display:none;
  }
  img.qr{
    background:#fff;
    padding:8px;
    border-radius:8px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🔥 Quiz Antincendio</h1>

  <p>Inserisci Nome e Cognome</p>
  <input type="text" id="nome" placeholder="Nome e Cognome">

  <p style="margin-top:14px;">Azienda</p>
  <input type="text" id="azienda" placeholder="Azienda">

  <div class="timer" id="timer">30:00</div>
  <div class="top-note">Durata quiz: 30 minuti</div>

  <br>
  <button onclick="startQuiz()">INIZIA QUIZ</button>
  <button class="admin-btn" onclick="openAdmin()">AREA DOCENTE</button>

  <div class="codebox">
    <p style="font-size:20px;"><strong>Codice corso: ANT-2026-01</strong></p>
    <img id="qrImage" class="qr" alt="QR Code" width="220" height="220">
    <p>QR Code accesso quiz</p>
    <div class="small">Sostituisci il link quando pubblichi il quiz online.</div>
  </div>

  <div id="quizBox"></div>

  <div class="hidden" id="signatureSection">
    <h2 style="text-align:center;">Firma digitale partecipante</h2>
    <div class="signbox">
      <canvas id="signatureCanvas"></canvas>
    </div>
    <div class="actions">
      <button onclick="clearSignature()">Cancella firma</button>
      <button onclick="finishQuiz()">INVIA QUIZ</button>
    </div>
  </div>

  <div id="resultBox"></div>

  <div class="adminpanel" id="adminPanel">
    <h2>Area Docente / Admin</h2>
    <p>Codice admin: <strong>1605</strong></p>
    <button onclick="downloadResults()">Scarica risultati CSV</button>
    <button onclick="clearResults()">Cancella risultati</button>
    <table id="resultsTable">
      <thead>
        <tr>
          <th>Data</th>
          <th>Nome</th>
          <th>Azienda</th>
          <th>Punteggio</th>
          <th>Esito</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const SHARE_LINK = "https://camardoalessio81-design.github.io/quiz-antincendio/";
const PASS_SCORE = 14;
const ADMIN_CODE = "1605";
const STORAGE_KEY = "quizAntincendioResults_v6";

const questions = [
  { title: "Domanda 1", text: "Quale estintore è normalmente più adatto per apparecchiature elettriche in tensione?", options: ["Acqua", "Schiuma", "CO2", "Sabbia"], correct: 2 },
  { title: "Domanda 2", text: "La classe di incendio B riguarda principalmente:", options: ["Materiali solidi combustibili", "Liquidi infiammabili", "Gas inerti", "Metalli"], correct: 1 },
  { title: "Domanda 3", text: "Quale tra questi è un sistema di protezione attiva antincendio?", options: ["Compartimentazione REI", "Rivelazione automatica e allarme", "Distanza di sicurezza", "Isolamento termico"], correct: 1 },
  { title: "Domanda 4", text: "Nel triangolo del fuoco quale elemento NON compare?", options: ["Calore", "Combustibile", "Comburente", "Azoto"], correct: 3 },
  { title: "Domanda 5", text: "Qual è la prima azione corretta in caso di principio di incendio, se non c'è pericolo immediato?", options: ["Correre senza avvisare nessuno", "Dare l’allarme e valutare l’intervento in sicurezza", "Aprire tutte le finestre", "Nascondersi"], correct: 1 },
  { title: "Domanda 6", text: "La classe di incendio F riguarda:", options: ["Carta e legno", "Apparecchiature elettriche", "Oli e grassi da cucina", "Metalli combustibili"], correct: 2 },
  { title: "Domanda 7", text: "Il getto dell’estintore va diretto:", options: ["Sopra il fumo", "Alla base delle fiamme", "Sul soffitto", "Sul lato opposto alla fiamma"], correct: 1 },
  { title: "Domanda 8", text: "La compartimentazione antincendio serve a:", options: ["Ridurre i consumi elettrici", "Limitare la propagazione di fiamme e fumo", "Sostituire gli estintori", "Aumentare il rumore di allarme"], correct: 1 },
  { title: "Domanda 9", text: "La segnaletica antincendio è normalmente di colore:", options: ["Verde", "Rosso", "Blu", "Giallo"], correct: 1 },
  { title: "Domanda 10", text: "Quale documento disciplina la gestione delle procedure in caso di incendio ed evacuazione?", options: ["POS", "DUVRI", "Piano di emergenza ed evacuazione", "Verbale di coordinamento"], correct: 2 },
  { title: "Domanda 11", text: "Quale estintore è generalmente più versatile su più classi di incendio?", options: ["Acqua", "Polvere", "Solo CO2", "Coperta antifiamma"], correct: 1 },
  { title: "Domanda 12", text: "Il fumo d’incendio può provocare:", options: ["Solo fastidio visivo", "Intossicazione, asfissia e perdita di orientamento", "Soltanto aumento dell’umidità", "Nessun pericolo se le fiamme sono basse"], correct: 1 },
  { title: "Domanda 13", text: "La manutenzione degli estintori deve essere eseguita:", options: ["Solo dopo l’uso", "Periodicamente da personale competente", "Solo se il datore di lavoro vuole", "Ogni 10 anni"], correct: 1 },
  { title: "Domanda 14", text: "Durante l’evacuazione l’ascensore:", options: ["Va usato per velocizzare l’uscita", "In genere non va usato salvo impianti dedicati all’emergenza", "Va usato dai soli visitatori", "È sempre obbligatorio"], correct: 1 },
  { title: "Domanda 15", text: "Un naspo o un idrante antincendio è:", options: ["Un documento aziendale", "Un mezzo fisso di protezione antincendio", "Un DPI", "Un segnale luminoso"], correct: 1 },
  { title: "Domanda 16", text: "La classe di incendio D riguarda:", options: ["Carta e cartone", "Oli da cucina", "Metalli combustibili", "Gas medicali"], correct: 2 },
  { title: "Domanda 17", text: "La sigla REI nelle porte tagliafuoco indica:", options: ["Riduzione emissioni industriali", "Resistenza, Ermeticità, Isolamento", "Rischio, Evacuazione, Incendio", "Reazione Elettrica Interna"], correct: 1 },
  { title: "Domanda 18", text: "Quale comportamento è scorretto durante l’esodo?", options: ["Seguire la segnaletica", "Raggiungere il punto di raccolta", "Tornare indietro a prendere oggetti personali", "Mantenere la calma"], correct: 2 },
  { title: "Domanda 19", text: "Per “innesco” si intende:", options: ["La sorgente capace di avviare la combustione", "Un materiale inerte", "Il fumo residuo", "Il punto di raccolta"], correct: 0 },
  { title: "Domanda 20", text: "Chi designa gli addetti antincendio nei luoghi di lavoro?", options: ["Il RLS", "Il datore di lavoro", "Il medico competente", "Il preposto"], correct: 1 }
];

let timeLeft = 1800;
let timerStarted = false;
let timerInterval = null;
let answersLocked = {};
let quizFinished = false;

function buildQRCode(){
  const currentLink = (SHARE_LINK && SHARE_LINK.trim() !== "") ? SHARE_LINK.trim() : window.location.href;
  const qr = document.getElementById("qrImage");
  qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(currentLink);
}

function buildQuiz(){
  const box = document.getElementById("quizBox");
  box.innerHTML = "";

  questions.forEach((q, index) => {
    const qNum = index + 1;
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<h3>${q.title}</h3><p>${q.text}</p>`;

    q.options.forEach((opt, i) => {
      const label = document.createElement("label");
      label.innerHTML = `<input type="radio" name="q${qNum}" value="${i}" onclick="lockAnswer(${qNum}, ${i})"> ${opt}`;
      div.appendChild(label);
    });

    const note = document.createElement("div");
    note.id = "lock-note-" + qNum;
    note.className = "locked-note";
    div.appendChild(note);

    box.appendChild(div);
  });
}

function lockAnswer(qNum, chosenIndex){
  if(quizFinished) return;
  if(answersLocked[qNum] !== undefined) return;

  answersLocked[qNum] = chosenIndex;

  const radios = document.querySelectorAll(`input[name="q${qNum}"]`);
  const correctIndex = questions[qNum - 1].correct;
  const note = document.getElementById("lock-note-" + qNum);

  radios.forEach((radio, index) => {
    if(index === chosenIndex){
      radio.checked = true;
      radio.disabled = false;
    } else {
      radio.disabled = true;
    }
  });

  if(chosenIndex === correctIndex){
    note.innerHTML = "Risposta corretta.";
    note.style.color = "#7dff9f";
  } else {
    note.innerHTML = "Risposta corretta: " + questions[qNum - 1].options[correctIndex];
    note.style.color = "#ffd86a";
  }
}

function updateTimer(){
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  document.getElementById("timer").textContent =
    String(minutes).padStart(2,"0") + ":" + String(seconds).padStart(2,"0");

  if(timeLeft <= 0){
    clearInterval(timerInterval);
    finishQuiz();
    return;
  }
  timeLeft--;
}

function startQuiz(){
  const nome = document.getElementById("nome").value.trim();
  if(nome === ""){
    alert("Inserisci Nome e Cognome");
    return;
  }

  document.getElementById("quizBox").style.display = "block";
  document.getElementById("signatureSection").classList.remove("hidden");

  if(!timerStarted){
    timerStarted = true;
    timerInterval = setInterval(updateTimer, 1000);
  }

  document.getElementById("quizBox").scrollIntoView({behavior:"smooth"});
}

function getScoreAndReview(){
  let score = 0;
  let review = [];

  questions.forEach((q, idx) => {
    const qNum = idx + 1;
    const chosen = answersLocked[qNum] !== undefined ? answersLocked[qNum] : null;
    const isCorrect = chosen === q.correct;
    if(isCorrect) score++;

    review.push({
      title: q.title,
      text: q.text,
      chosenText: chosen === null ? "Nessuna risposta" : q.options[chosen],
      correctText: q.options[q.correct],
      isCorrect: isCorrect
    });
  });

  return {score, review};
}

function finishQuiz(){
  if(quizFinished) return;

  const nome = document.getElementById("nome").value.trim();
  const azienda = document.getElementById("azienda").value.trim();

  if(nome === ""){
    alert("Inserisci Nome e Cognome");
    return;
  }
  if(isSignatureBlank()){
    alert("Inserisci la firma digitale");
    return;
  }

  quizFinished = true;
  clearInterval(timerInterval);

  const data = getScoreAndReview();
  const score = data.score;
  const review = data.review;
  const esito = score >= PASS_SCORE ? "IDONEO" : "NON IDONEO";

  for(let i = 1; i <= questions.length; i++){
    document.querySelectorAll(`input[name="q${i}"]`).forEach(el => el.disabled = true);
  }

  let html = `
    <h2>Risultato Quiz</h2>
    <p><strong>Nome:</strong> ${escapeHtml(nome)}</p>
    <p><strong>Azienda:</strong> ${escapeHtml(azienda)}</p>
    <p><strong>Punteggio:</strong> ${score}/20</p>
    <p><strong>Esito:</strong> ${esito}</p>
    <h3>Correzione finale</h3>
  `;

  review.forEach((r, i) => {
    html += `
      <div class="review-box">
        <p><strong>${i+1}. ${escapeHtml(r.text)}</strong></p>
        <p>La tua risposta: <span class="${r.isCorrect ? 'correct' : 'wrong'}">${escapeHtml(r.chosenText)}</span></p>
        ${r.isCorrect ? '' : `<p>Risposta corretta: <span class="correct">${escapeHtml(r.correctText)}</span></p>`}
      </div>
    `;
  });

  document.getElementById("resultBox").style.display = "block";
  document.getElementById("resultBox").innerHTML = html;
  saveResult(nome, azienda, score, esito);
  document.getElementById("resultBox").scrollIntoView({behavior:"smooth"});
}

function saveResult(nome, azienda, score, esito){
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  results.push({
    data: new Date().toLocaleString(),
    nome: nome,
    azienda: azienda,
    score: score,
    esito: esito
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
}

function openAdmin(){
  const code = prompt("Inserisci codice admin");
  if(code !== ADMIN_CODE){
    alert("Codice errato");
    return;
  }
  document.getElementById("adminPanel").style.display = "block";
  loadResults();
  document.getElementById("adminPanel").scrollIntoView({behavior:"smooth"});
}

function loadResults(){
  const tbody = document.querySelector("#resultsTable tbody");
  tbody.innerHTML = "";
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  results.forEach(r => {
    const row = document.createElement("tr");
    row.innerHTML =
      "<td>" + escapeHtml(r.data) + "</td>" +
      "<td>" + escapeHtml(r.nome) + "</td>" +
      "<td>" + escapeHtml(r.azienda) + "</td>" +
      "<td>" + r.score + "/20</td>" +
      "<td>" + escapeHtml(r.esito) + "</td>";
    tbody.appendChild(row);
  });
}

function downloadResults(){
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let csv = "Data;Nome;Azienda;Punteggio;Esito\\n";
  results.forEach(r => {
    csv += '"' + (r.data||"") + '";"' + (r.nome||"") + '";"' + (r.azienda||"") + '";"' + r.score + '/20";"' + (r.esito||"") + '"\\n';
  });
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "risultati_quiz_antincendio.csv";
  link.click();
}

function clearResults(){
  if(confirm("Vuoi cancellare tutti i risultati salvati?")){
    localStorage.removeItem(STORAGE_KEY);
    loadResults();
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, function(m){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
  });
}

const canvas = document.getElementById("signatureCanvas");
const ctx = canvas.getContext("2d");
let drawing = false;

function resizeCanvas(){
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#111";
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,rect.width,rect.height);
}
resizeCanvas();

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  if(e.touches && e.touches[0]){
    return {x:e.touches[0].clientX - rect.left, y:e.touches[0].clientY - rect.top};
  }
  return {x:e.clientX - rect.left, y:e.clientY - rect.top};
}

function startDraw(e){
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  e.preventDefault();
}

function drawMove(e){
  if(!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  e.preventDefault();
}

function endDraw(){
  drawing = false;
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", drawMove);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mouseleave", endDraw);
canvas.addEventListener("touchstart", startDraw, {passive:false});
canvas.addEventListener("touchmove", drawMove, {passive:false});
canvas.addEventListener("touchend", endDraw);

function clearSignature(){
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,rect.width,rect.height);
}

function isSignatureBlank(){
  const blank = document.createElement("canvas");
  const rect = canvas.getBoundingClientRect();
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  blank.width = rect.width * ratio;
  blank.height = rect.height * ratio;
  const bctx = blank.getContext("2d");
  bctx.scale(ratio, ratio);
  bctx.fillStyle = "#fff";
  bctx.fillRect(0,0,rect.width,rect.height);
  return canvas.toDataURL() === blank.toDataURL();
}

window.addEventListener("resize", function(){
  const saved = canvas.toDataURL();
  resizeCanvas();
  const img = new Image();
  img.onload = function(){
    ctx.drawImage(img, 0, 0, canvas.clientWidth, canvas.clientHeight);
  };
  img.src = saved;
});

buildQRCode();
buildQuiz();
function salvaRisultato(nome, azienda, punteggio, esito) {

fetch(https://script.google.com/macros/s/AKfycbw7haDpjE8PJ6IvRqArX4w7lwX1AeTIA4a60LNyfbfomiv3TV-qDeO4KLOUkvZqWo-vxQ/exec
method: "POST",
body: JSON.stringify({
nome: nome,
azienda: azienda,
punteggio: punteggio,
esito: esito
}),
headers: {
"Content-Type": "application/json"
}
});

}
</script>
 
</body>
</html>
