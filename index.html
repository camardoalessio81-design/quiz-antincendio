<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Quiz Antincendio</title>

<style>

body{
font-family:Arial;
background:#0f1a2b;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:#16253f;
padding:30px;
border-radius:12px;
}

input{
width:80%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.start{
background:#ff6b00;
color:white;
}

.question{
margin-top:20px;
}

.timer{
font-size:26px;
margin-top:10px;
color:#ffc107;
}

.result{
margin-top:20px;
font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 Quiz Antincendio</h1>

<input id="nome" placeholder="Nome e Cognome">
<br>

<input id="azienda" placeholder="Azienda">

<div class="timer" id="timer">30:00</div>

<button class="start" onclick="startQuiz()">INIZIA QUIZ</button>

<br><br>

<img id="qr" width="200">

<div id="quiz"></div>

<div class="result" id="result"></div>

</div>

<script>

const linkQuiz="https://camardoalessio81-design.github.io/quiz-antincendio/";

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+linkQuiz;

let domande=[
{
q:"Quale estintore si usa per incendi elettrici?",
a:["Acqua","CO2","Schiuma"],
c:1
},
{
q:"Cosa significa R.E.I?",
a:["Resistenza fuoco","Ritardo incendio","Protezione fumo"],
c:0
},
{
q:"Cosa fare prima di usare un estintore?",
a:["Avvicinarsi al fuoco","Togliere sicura","Scuotere"],
c:1
}
];

let corrente=0;
let punteggio=0;

function startQuiz(){

let nome=document.getElementById("nome").value;

if(nome==""){
alert("Inserisci nome");
return;
}

mostraDomanda();

}

function mostraDomanda(){

let d=domande[corrente];

let html="<div class='question'><h3>"+d.q+"</h3>";

for(let i=0;i<d.a.length;i++){

html+="<button onclick='rispondi("+i+")'>"+d.a[i]+"</button><br>";

}

html+="</div>";

document.getElementById("quiz").innerHTML=html;

}

function rispondi(i){

if(i==domande[corrente].c){
punteggio++;
}

corrente++;

if(corrente<domande.length){
mostraDomanda();
}else{
fineQuiz();
}

}

function fineQuiz(){

document.getElementById("quiz").innerHTML="";

document.getElementById("result").innerHTML=
"Punteggio: "+punteggio+" / "+domande.length;

}

</script>

</body>
</html>
